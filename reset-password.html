<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkiRack – Nytt passord</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f172a 0%, #0f766e 50%, #0f172a 100%);
  }
  .card {
    width: 320px;
    max-width: 90vw;
    padding: 32px;
    border-radius: 20px;
    background: linear-gradient(180deg, #1a2a3a 0%, #0f1f2e 100%);
    border: 1px solid #1e3a4a;
    color: #fff;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 20px;
    text-align: center;
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 1.5px;
    color: #64748b;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 12px;
    margin-bottom: 14px;
    border-radius: 10px;
    border: 1px solid #2a3a4a;
    background: #0f172a;
    color: #fff;
    font-size: 15px;
  }
  input:focus { outline: 1px solid #0d9488; }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #0f766e 0%, #0d9488 100%);
    color: #fff;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .msg { margin-top: 14px; font-size: 13px; text-align: center; }
  .error { color: #ef4444; }
  .success { color: #4ade80; }
</style>
</head>
<body>
  <div class="card">
    <h1>⛷ Sett nytt passord</h1>
    <div id="form">
      <label>NYTT PASSORD</label>
      <input id="password" type="password" placeholder="Minimum 6 tegn">
      <label>GJENTA PASSORD</label>
      <input id="confirm" type="password" placeholder="Gjenta passord">
      <button id="submitBtn">Lagre nytt passord</button>
      <div id="msg" class="msg"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://rjdlrdhbnufsmatiqsrx.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_SYAb2N8efYSum-VFSEuDqg_UvJz0UqR";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const msgEl = document.getElementById("msg");
    const btn = document.getElementById("submitBtn");
    const formEl = document.getElementById("form");

    let recoveryReady = false;

    supabaseClient.auth.onAuthStateChange((event) => {
      if (event === "PASSWORD_RECOVERY") {
        recoveryReady = true;
      }
    });

    setTimeout(() => {
      if (!recoveryReady) {
        msgEl.textContent = "Lenken er ugyldig eller har gått ut. Be om en ny fra appen.";
        msgEl.className = "msg error";
        btn.disabled = true;
      }
    }, 1500);

    btn.addEventListener("click", async () => {
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;

      if (password.length < 6) {
        msgEl.textContent = "Passordet må være minst 6 tegn.";
        msgEl.className = "msg error";
        return;
      }
      if (password !== confirm) {
        msgEl.textContent = "Passordene er ikke like.";
        msgEl.className = "msg error";
        return;
      }

      btn.disabled = true;
      msgEl.textContent = "";

      const { error } = await supabaseClient.auth.updateUser({ password });

      if (error) {
        msgEl.textContent = error.message;
        msgEl.className = "msg error";
        btn.disabled = false;
      } else {
        formEl.innerHTML =
          '<div class="msg success">Passordet er endret. Du kan nå åpne SkiRack-appen og logge inn med det nye passordet.</div>';
      }
    });
  </script>
</body>
</html>
